<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Japaholic - 旅日成就誌</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&family=Noto+Serif+TC:wght@700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --muji-bg: #F4F3F0;
            --muji-paper: #FFFFFF;
            --muji-text: #1A1A1A;
            --muji-gray: #4A4A4A;
            --muji-light-gray: #D1D1D1;
        }

        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: var(--muji-bg);
            color: var(--muji-text);
            -webkit-tap-highlight-color: transparent;
            overflow-x: hidden;
            line-height: 1.6;
        }

        .serif { font-family: 'Noto Serif TC', serif; font-weight: 900; }

        /* 進度條 */
        .progress-container {
            max-width: 450px;
            margin: 0 auto;
            background: white;
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.03);
        }

        .progress-track {
            height: 8px;
            background: #E8E8E8;
            border-radius: 10px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: var(--muji-text);
            width: 0%;
            transition: width 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* 統計區塊 */
        .stats-container {
            max-width: 450px;
            margin: 24px auto 0;
            display: flex;
            gap: 12px;
            justify-content: center;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.6);
            border: 1px solid #E5E4E0;
            padding: 10px 16px;
            border-radius: 14px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-width: 100px;
            transition: all 0.3s ease;
        }

        .stat-rank {
            font-size: 9px;
            font-weight: 900;
            color: #A1A1A1;
            letter-spacing: 0.1em;
            margin-bottom: 2px;
        }

        .stat-name {
            font-size: 14px;
            font-weight: 700;
            color: var(--muji-text);
        }

        .stat-count {
            font-size: 10px;
            font-weight: 900;
            background: var(--muji-text);
            color: white;
            padding: 1px 6px;
            border-radius: 6px;
            margin-top: 4px;
        }

        /* 地圖樣式 */
        .pref-path {
            fill: var(--muji-paper);
            stroke: #888;
            stroke-width: 1.2;
            transition: all 0.2s ease;
            cursor: pointer;
        }

        .visited { fill: #E2E1DD !important; stroke: #444 !important; }
        .planning { fill: #FFFFFF !important; stroke: #1A1A1A !important; stroke-dasharray: 4,4; }

        .label-text {
            font-size: 11px;
            fill: #000;
            pointer-events: none;
            text-anchor: middle;
            font-weight: 900;
            paint-order: stroke;
            stroke: white;
            stroke-width: 2.5px;
        }

        /* 彈窗 */
        #modal-overlay {
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(10px);
            display: none;
            position: fixed;
            inset: 0;
            z-index: 100;
            align-items: flex-end;
            justify-content: center;
        }

        @media (min-width: 768px) { #modal-overlay { align-items: center; } }

        .modal-card {
            background: var(--muji-paper);
            width: 100%;
            max-width: 500px;
            border-radius: 30px 30px 0 0;
            overflow: hidden;
            max-height: 90vh;
            display: flex;
            flex-direction: column;
            box-shadow: 0 -10px 50px rgba(0,0,0,0.3);
            pointer-events: auto;
        }

        @media (min-width: 768px) { .modal-card { border-radius: 24px; } }

        .modal-banner {
            height: 240px;
            width: 100%;
            background-size: cover;
            background-position: center;
            position: relative;
            transition: background-image 0.4s ease;
        }

        .modal-banner::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(to bottom, transparent 40%, rgba(255,255,255,1));
        }

        .muji-btn {
            border: 2px solid #EAEAEA;
            padding: 14px;
            font-size: 14px;
            border-radius: 16px;
            transition: all 0.2s;
            color: #666;
            font-weight: 800;
        }

        .muji-btn.active {
            background: #1A1A1A;
            color: white;
            border-color: #1A1A1A;
        }

        .specialty-tag {
            display: inline-flex;
            align-items: center;
            background: #F8F8F8;
            padding: 6px 12px;
            border-radius: 50px;
            font-size: 13px;
            font-weight: 700;
            color: #555;
            border: 1px solid #EEE;
        }

        .watermark-text {
            position: absolute;
            right: -10px;
            bottom: 20px;
            font-size: 80px;
            font-weight: 900;
            color: rgba(0,0,0,0.03);
            pointer-events: none;
            transform: rotate(-5deg);
            white-space: nowrap;
        }
    </style>
</head>

        };

        let userData = JSON.parse(localStorage.getItem('japaholic_v4_data') || '{}');
        let currentId = null;

        const RANK_LABELS = ['TOP 1', 'TOP 2', 'TOP 3'];

        function updateUI() {
            let prefCount = 0;
            let totalV = 0;
            const visitCounts = [];

            document.querySelectorAll('.pref-path').forEach(el => {
                const data = userData[el.id] || { status: 'none', records: [] };
                el.classList.remove('visited', 'planning');
                
                if (data.status === 'visited') { 
                    el.classList.add('visited'); 
                    prefCount++; 
                    totalV += data.records.length;
                    
                    if (data.records.length > 0) {
                        visitCounts.push({
                            name: el.getAttribute('data-name'),
                            count: data.records.length
                        });
                    }
                }
                else if (data.status === 'planning') el.classList.add('planning');
            });

            // 更新進度與紀錄數
            document.getElementById('progress-fill').style.width = `${(prefCount/47)*100}%`;
            document.getElementById('progress-count').innerText = `${prefCount} / 47`;
            document.getElementById('total-visits').innerText = `TOTAL RECORD: ${totalV} VISITS`;

            // 更新前三名統計
            const statsContainer = document.getElementById('top-stats');
            const top3 = visitCounts.sort((a, b) => b.count - a.count).slice(0, 3);
            
            if (top3.length > 0) {
                statsContainer.innerHTML = top3.map((item, index) => `
                    <div class="stat-card">
                        <span class="stat-rank">${RANK_LABELS[index]}</span>
                        <span class="stat-name">${item.name}</span>
                        <span class="stat-count">${item.count}次</span>
                    </div>
                `).join('');
            } else {
                statsContainer.innerHTML = '<p class="text-[10px] text-gray-300 font-bold tracking-[0.2em] uppercase py-4">Waiting for your journey</p>';
            }

            localStorage.setItem('japaholic_v4_data', JSON.stringify(userData));
        }

        function setStatus(s) {
            ['none', 'visited', 'planning'].forEach(x => {
                const btn = document.getElementById(`btn-${x}`);
                if (btn) btn.classList.toggle('active', x === s);
            });
            const visitedSection = document.getElementById('visited-section');
            if (visitedSection) visitedSection.classList.toggle('hidden', s !== 'visited');
            
            if (s !== 'visited') {
                if (!userData[currentId]) userData[currentId] = { records: [] };
                userData[currentId].status = s;
                if (s === 'none') userData[currentId].records = [];
                updateUI();
            }
        }

        function renderRecords() {
            const list = document.getElementById('records-list');
            const data = userData[currentId] || { records: [] };
            document.getElementById('visit-count-badge').innerText = `${data.records.length} VISITS`;
            list.innerHTML = data.records.length ? '' : '<p class="text-center text-gray-300 py-6 font-bold text-sm tracking-widest uppercase">No Records Yet</p>';
            
            [...data.records].reverse().forEach((r, i) => {
                const div = document.createElement('div');
                div.className = 'bg-white p-4 rounded-xl border-2 border-gray-100 flex justify-between items-center';
                div.innerHTML = `<div><p class="font-black text-gray-900">${r.date}</p><p class="text-xs text-gray-400 font-bold">${r.note || ''}</p></div>
                <button onclick="delRec(${data.records.length - 1 - i})" class="text-[10px] font-black text-gray-300 hover:text-red-500 uppercase tracking-tighter">Delete</button>`;
                list.appendChild(div);
            });
        }

        window.delRec = (idx) => {
            userData[currentId].records.splice(idx, 1);
            if (userData[currentId].records.length === 0) { 
                userData[currentId].status = 'none'; 
                setStatus('none'); 
            }
            renderRecords(); 
            updateUI();
        };

        window.closeModal = () => {
            document.getElementById('modal-overlay').style.display = 'none';
        };

        document.getElementById('add-record-btn').onclick = () => {
            const dateInput = document.getElementById('visit-date');
            const noteInput = document.getElementById('visit-note');
            const date = dateInput.value;
            const note = noteInput.value;
            
            if (!date) return;
            if (!userData[currentId]) userData[currentId] = { records: [] };
            
            userData[currentId].status = 'visited';
            userData[currentId].records.push({ date, note });
            
            dateInput.value = '';
            noteInput.value = '';
            
            renderRecords(); 
            updateUI(); 
            setStatus('visited');
        };

        document.querySelectorAll('.pref-path').forEach(p => {
            p.onclick = () => {
                currentId = p.id;
                const info = PREF_DB[currentId] || { eng: currentId.toUpperCase(), icon: '📍', text: '探索日本的美', img: 'https://images.unsplash.com/photo-1493976040374-85c8e12f0c0e?q=80&w=800' };
                
                document.getElementById('modal-title').innerText = p.getAttribute('data-name');
                document.getElementById('modal-subtitle').innerText = info.eng;
                document.getElementById('watermark').innerText = info.eng;
                document.getElementById('specialty-icon').innerText = info.icon;
                document.getElementById('specialty-text').innerText = info.text;
                document.getElementById('modal-banner').style.backgroundImage = `url('${info.img}')`;
                
                setStatus(userData[currentId]?.status || 'none');
                renderRecords();
                document.getElementById('modal-overlay').style.display = 'flex';
            };
        });

        updateUI();
    </script>
