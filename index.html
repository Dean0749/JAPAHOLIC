<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Japaholic - 旅日成就誌</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&family=Noto+Serif+TC:wght@700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --muji-bg: #F4F3F0;
            --muji-paper: #FFFFFF;
            --muji-text: #1A1A1A;
            --muji-gray: #4A4A4A;
            --muji-light-gray: #D1D1D1;
        }

        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: var(--muji-bg);
            color: var(--muji-text);
            -webkit-tap-highlight-color: transparent;
            overflow-x: hidden;
            line-height: 1.6;
        }

        .serif { font-family: 'Noto Serif TC', serif; font-weight: 900; }

        /* 進度條 */
        .progress-container {
            max-width: 450px;
            margin: 0 auto;
            background: white;
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.03);
        }

        .progress-track {
            height: 8px;
            background: #E8E8E8;
            border-radius: 10px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: var(--muji-text);
            width: 0%;
            transition: width 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* 地圖樣式 */
        .pref-path {
            fill: var(--muji-paper);
            stroke: #888;
            stroke-width: 1.2;
            transition: all 0.2s ease;
            cursor: pointer;
        }

        .visited { fill: #E2E1DD !important; stroke: #444 !important; }
        .planning { fill: #FFFFFF !important; stroke: #1A1A1A !important; stroke-dasharray: 4,4; }

        .label-text {
            font-size: 11px;
            fill: #000;
            pointer-events: none;
            text-anchor: middle;
            font-weight: 900;
            paint-order: stroke;
            stroke: white;
            stroke-width: 2.5px;
        }

        /* 彈窗 */
        #modal-overlay {
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(10px);
            display: none;
            position: fixed;
            inset: 0;
            z-index: 100;
            align-items: flex-end;
            justify-content: center;
        }

        @media (min-width: 768px) { #modal-overlay { align-items: center; } }

        .modal-card {
            background: var(--muji-paper);
            width: 100%;
            max-width: 500px;
            border-radius: 30px 30px 0 0;
            overflow: hidden;
            max-height: 90vh;
            display: flex;
            flex-direction: column;
            box-shadow: 0 -10px 50px rgba(0,0,0,0.3);
        }

        @media (min-width: 768px) { .modal-card { border-radius: 24px; } }

        .modal-banner {
            height: 240px;
            width: 100%;
            background-size: cover;
            background-position: center;
            position: relative;
            transition: background-image 0.4s ease;
        }

        .modal-banner::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(to bottom, transparent 40%, rgba(255,255,255,1));
        }

        .muji-btn {
            border: 2px solid #EAEAEA;
            padding: 14px;
            font-size: 14px;
            border-radius: 16px;
            transition: all 0.2s;
            color: #666;
            font-weight: 800;
        }

        .muji-btn.active {
            background: #1A1A1A;
            color: white;
            border-color: #1A1A1A;
        }

        .specialty-tag {
            display: inline-flex;
            align-items: center;
            background: #F8F8F8;
            padding: 6px 12px;
            border-radius: 50px;
            font-size: 13px;
            font-weight: 700;
            color: #555;
            border: 1px solid #EEE;
        }

        .watermark-text {
            position: absolute;
            right: -10px;
            bottom: 20px;
            font-size: 80px;
            font-weight: 900;
            color: rgba(0,0,0,0.03);
            pointer-events: none;
            transform: rotate(-5deg);
            white-space: nowrap;
        }
    </style>
</head>

            shiga: { eng: 'Shiga', icon: '🛶', text: '琵琶湖與近江牛', img: 'https://images.unsplash.com/photo-1530908293208-410a6237894a?q=80&w=800' },
            kyoto: { eng: 'Kyoto', icon: '🎋', text: '清水寺與金閣寺', img: 'https://images.unsplash.com/photo-1493976040374-85c8e12f0c0e?q=80&w=800' },
            osaka: { eng: 'Osaka', icon: '🐙', text: '心齋橋與章魚燒', img: 'https://images.unsplash.com/photo-1590559899731-a382839e5549?q=80&w=800' },
            hyogo: { eng: 'Hyogo', icon: '🏯', text: '姬路城與神戶牛', img: 'https://images.unsplash.com/photo-1590632263433-28f0914101cc?q=80&w=800' },
            nara: { eng: 'Nara', icon: '🦌', text: '奈良公園的小鹿', img: 'https://images.unsplash.com/photo-1549144464-07e1136b3346?q=80&w=800' },
            wakayama: { eng: 'Wakayama', icon: '⛩️', text: '那智瀑布與熊野', img: 'https://images.unsplash.com/photo-1626015024769-173873998656?q=80&w=800' },
            tottori: { eng: 'Tottori', icon: '🐪', text: '鳥取砂丘', img: 'https://images.unsplash.com/photo-1542157585-ef20bcc4f48d?q=80&w=800' },
            shimane: { eng: 'Shimane', icon: '🌅', text: '出雲大社與緣分', img: 'https://images.unsplash.com/photo-1621252179027-94459d278660?q=80&w=800' },
            okayama: { eng: 'Okayama', icon: '🍑', text: '桃太郎與後樂園', img: 'https://images.unsplash.com/photo-1596464716127-f2a82984de30?q=80&w=800' },
            hiroshima: { eng: 'Hiroshima', icon: '⛩️', text: '嚴島神社大鳥居', img: 'https://images.unsplash.com/photo-1549392557-046679545f44?q=80&w=800' },
            yamaguchi: { eng: 'Yamaguchi', icon: '🐡', text: '錦帶橋與河豚', img: 'https://images.unsplash.com/photo-1599388144800-9831c0e3592f?q=80&w=800' },
            tokushima: { eng: 'Tokushima', icon: '💃', text: '鳴門漩渦與阿波舞', img: 'https://images.unsplash.com/photo-1605649441113-17b9b1875d31?q=80&w=800' },
            kagawa: { eng: 'Kagawa', icon: '🍜', text: '讚岐烏龍麵之鄉', img: 'https://images.unsplash.com/photo-1604514813560-1e4f5726db65?q=80&w=800' },
            ehime: { eng: 'Ehime', icon: '🍊', text: '道後溫泉與蜜柑', img: 'https://images.unsplash.com/photo-1610427845722-671891516e87?q=80&w=800' },
            kochi: { eng: 'Kochi', icon: '🐟', text: '桂濱與炙燒鰹魚', img: 'https://images.unsplash.com/photo-1610427845722-671891516e87?q=80&w=800' },
            fukuoka: { eng: 'Fukuoka', icon: '🍜', text: '博多拉麵與屋台', img: 'https://images.unsplash.com/photo-1542051841857-5f90071e7989?q=80&w=800' },
            saga: { eng: 'Saga', icon: '🏺', text: '熱氣球與有田燒', img: 'https://images.unsplash.com/photo-1621252179027-94459d278660?q=80&w=800' },
            nagasaki: { eng: 'Nagasaki', icon: '🏮', text: '豪斯登堡與夜景', img: 'https://images.unsplash.com/photo-1571408018335-502213e4b786?q=80&w=800' },
            kumamoto: { eng: 'Kumamoto', icon: '🐻', text: '熊本城與阿蘇山', img: 'https://images.unsplash.com/photo-1543881515-38b438b40810?q=80&w=800' },
            oita: { eng: 'Oita', icon: '♨️', text: '別府由布院溫泉', img: 'https://images.unsplash.com/photo-1590457313835-09559e35824c?q=80&w=800' },
            miyazaki: { eng: 'Miyazaki', icon: '🌴', text: '高千穗峽與芒果', img: 'https://images.unsplash.com/photo-1621252179027-94459d278660?q=80&w=800' },
            kagoshima: { eng: 'Kagoshima', icon: '🌋', text: '櫻島火山與黑豬', img: 'https://images.unsplash.com/photo-1621252179027-94459d278660?q=80&w=800' },
            okinawa: { eng: 'Okinawa', icon: '🏝️', text: '首里城與沖繩海', img: 'https://images.unsplash.com/photo-1534067783941-51c9c23ecefd?q=80&w=800' }
        };

        let userData = JSON.parse(localStorage.getItem('japaholic_v4_data') || '{}');
        let currentId = null;

        function updateUI() {
            let prefCount = 0;
            let totalV = 0;
            document.querySelectorAll('.pref-path').forEach(el => {
                const data = userData[el.id] || { status: 'none', records: [] };
                el.classList.remove('visited', 'planning');
                if (data.status === 'visited') { el.classList.add('visited'); prefCount++; totalV += data.records.length; }
                else if (data.status === 'planning') el.classList.add('planning');
            });
            document.getElementById('progress-fill').style.width = `${(prefCount/47)*100}%`;
            document.getElementById('progress-count').innerText = `${prefCount} / 47`;
            document.getElementById('total-visits').innerText = `TOTAL RECORD: ${totalV} VISITS`;
            localStorage.setItem('japaholic_v4_data', JSON.stringify(userData));
        }

        function setStatus(s) {
            ['none', 'visited', 'planning'].forEach(x => {
                document.getElementById(`btn-${x}`).classList.toggle('active', x === s);
            });
            document.getElementById('visited-section').classList.toggle('hidden', s !== 'visited');
            if (s !== 'visited') {
                if (!userData[currentId]) userData[currentId] = { records: [] };
                userData[currentId].status = s;
                if (s === 'none') userData[currentId].records = [];
                updateUI();
            }
        }

        function renderRecords() {
            const list = document.getElementById('records-list');
            const data = userData[currentId] || { records: [] };
            document.getElementById('visit-count-badge').innerText = `${data.records.length} VISITS`;
            list.innerHTML = data.records.length ? '' : '<p class="text-center text-gray-300 py-6 font-bold text-sm tracking-widest uppercase">No Records Yet</p>';
            [...data.records].reverse().forEach((r, i) => {
                const div = document.createElement('div');
                div.className = 'bg-white p-4 rounded-xl border-2 border-gray-100 flex justify-between items-center';
                div.innerHTML = `<div><p class="font-black text-gray-900">${r.date}</p><p class="text-xs text-gray-400 font-bold">${r.note || ''}</p></div>
                <button onclick="delRec(${data.records.length - 1 - i})" class="text-[10px] font-black text-gray-300 hover:text-red-500 uppercase tracking-tighter">Delete</button>`;
                list.appendChild(div);
            });
        }

        window.delRec = (idx) => {
            userData[currentId].records.splice(idx, 1);
            if (userData[currentId].records.length === 0) { userData[currentId].status = 'none'; setStatus('none'); }
            renderRecords(); updateUI();
        };

        document.getElementById('add-record-btn').onclick = () => {
            const date = document.getElementById('visit-date').value;
            const note = document.getElementById('visit-note').value;
            if (!date) return;
            if (!userData[currentId]) userData[currentId] = { records: [] };
            userData[currentId].status = 'visited';
            userData[currentId].records.push({ date, note });
            document.getElementById('visit-date').value = '';
            document.getElementById('visit-note').value = '';
            renderRecords(); updateUI(); setStatus('visited');
        };

        document.querySelectorAll('.pref-path').forEach(p => {
            p.onclick = () => {
                currentId = p.id;
                const info = PREF_DB[currentId] || { eng: currentId.toUpperCase(), icon: '📍', text: '探索日本的美', img: 'https://images.unsplash.com/photo-1493976040374-85c8e12f0c0e?q=80&w=800' };
                
                document.getElementById('modal-title').innerText = p.getAttribute('data-name');
                document.getElementById('modal-subtitle').innerText = info.eng;
                document.getElementById('watermark').innerText = info.eng;
                document.getElementById('specialty-icon').innerText = info.icon;
                document.getElementById('specialty-text').innerText = info.text;
                document.getElementById('modal-banner').style.backgroundImage = `url('${info.img}')`;
                
                setStatus(userData[currentId]?.status || 'none');
                renderRecords();
                document.getElementById('modal-overlay').style.display = 'flex';
            };
        });

        document.getElementById('modal-close').onclick = () => document.getElementById('modal-overlay').style.display = 'none';
        updateUI();
    </script>
</body>
</html>
